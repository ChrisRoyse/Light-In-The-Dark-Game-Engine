# The Unbound — building tables (R-AST-1; identity.md §2: nomads who abandoned
# the beacons — camp vernacular, cheap/fast structures). Buildings are
# trainable-producer [[unit]] entries (footprint + build-seconds). Faction
# texture = AGGRESSION: cheaper and faster to raise than the Vigil counterparts,
# lighter (heavy, not fortified) armor, and NO static defense building — the
# army is the wall. Tech gating lives in data/tech/upgrades.toml.

# Fire_kraal — town hall (tier-1 root). Trains the forager; gold/lumber depot;
# starting food. Cheaper and faster than the Vigil bastion.
[[unit]]
id = "fire_kraal"
life = 1350
armor = 3
armor-type = "heavy"
move-speed = 0
turn-rate = 0.1
collision-size = 48
pathing = "ground"
sight-day = 1400
sight-night = 1000
model = "buildings/unbound/fire_kraal.glb"
footprint = 4
build-seconds = 80.0
food-provided = 10
costs = { gold = 350, lumber = 150 }
depot-for = ["gold", "lumber"]
trains = ["forager"]

