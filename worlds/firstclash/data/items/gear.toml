# Tiered hero gear (#157; identity.md §4 tiered items 1-4 found/bought/crafted,
# §6.5 original medieval+magic names). Passive stat gear carried in the hero
# inventory (canonical items API). Stat modifiers are the #162 vocabulary
# (move-speed wu/s, armor points, attack-cooldown seconds, attack-damage points)
# — life/regen mods await that vocabulary's extension. Values scale with tier;
# crafted items assemble strictly-lower-tier components (acyclic, validator-
# enforced). Tier 4 = a strong capstone artifact, NOT an army transformation
# (transformations are post-v0.1, identity.md §8). Bought items priced in gold.

# ---- Tier 1 — basic gear --------------------------------------------------
[[item]]
id = "oak_buckler"
name = "Oak Buckler"
class = "permanent"
tier = 1
acquisition = "found"
[[item.mod]]
stat = "armor"
add = 2

