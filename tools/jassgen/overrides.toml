# Rect value methods (litd/api/rect.go) and Vec2 (handles.go). The Region
# trigger-area noun, GetWorldBounds, GetLocationZ (TerrainHeight) and
# RandomPointIn need new sim subsystems (cell tracking / heightfield) and stay
# pending — tracked on #241.

[[override]]
name = "Rect"
class = "D3"
goMapping = "NewRect"
goSignature = "(a, b Vec2) Rect"
package = "litd/api"
reason = "(minx,miny,maxx,maxy) rect constructor collapses onto NewRect over two Vec2 corners (R-API-2); GC owns the value, no RemoveRect"

[[override]]
name = "MoveRectTo"
class = "D2"
goMapping = "Rect.Offset"
goSignature = "(d Vec2) Rect"
collapsesWith = ["MoveRectToLoc"]
package = "litd/api"
reason = "a Rect is a value with no identity to mutate; recentering re-issues a translated value via Rect.Offset (hazard 4); the Loc variant collapses (location->Vec2)"

