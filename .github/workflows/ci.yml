name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (cgo / OpenGL / OpenAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libgl1-mesa-dev libopenal-dev libvorbis-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore repoes/ (pinned SHAs + LITD-PATCH set)
        run: ./scripts/restore-repoes.sh

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

      - name: assetcheck gate (asset binaries are untracked; gate runs where they exist)
        run: |
          if ls assets/*/*.glb >/dev/null 2>&1; then
            go run ./tools/assetcheck ./assets
          else
            echo "NOTICE: no asset binaries in checkout (gitignored by design)."
            echo "assetcheck must be run locally against the real assets/ before committing MANIFEST changes."
          fi

      - name: import-graph gate (sim never imports render/G3N/GL)
        run: go run ./tools/importcheck

      - name: determinism lint gate (no map iteration / wall clock / floats / raw F64 ops)
        run: go run ./tools/determlint ./litd/...

      - name: license-scan gate (permissive allowlist, copyleft hard-fail)
        run: ./scripts/license-scan.sh

  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (cgo / OpenGL / OpenAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libgl1-mesa-dev libopenal-dev libvorbis-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore repoes/ (pinned SHAs + LITD-PATCH set)
        run: ./scripts/restore-repoes.sh

      - name: Restore bench history (rolling window)
        uses: actions/cache@v4
        with:
          path: benchmarks/history.jsonl
          key: bench-history-${{ github.run_id }}
          restore-keys: bench-history-

      - name: benchmark budgets gate (R-GC-5)
        run: go run ./tools/benchharness

      - name: Upload bench history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history
          path: benchmarks/history.jsonl
