# jassgen overrides — reviewed human judgment over the mechanical D1-D5 classifier.
#
# This file is the ONLY place tombstones may originate (G1.4) and the only place
# heuristic classes are corrected. Every entry needs a `reason`. Fields:
#   name      = source function name (must exist in common.j/blizzard.j/common.ai)
#   class     = "D1".."D5"            (required for a schema-emittable entry)
#   goMapping = canonical Go symbol   (required iff disposition == mapped)
#   package   = litd/api | litd/api/helpers | litd/ai
#   tombstone = deprecated | gameplay-irrelevant | superseded | deferred-v2
#   reason    = required, human-readable justification
#
# Tombstone reasons are a closed enum (deduplication-policy.md §7). An entry is
# emitted into api-manifest.json only when it is schema-complete: a D1-D5 class
# plus either a goMapping (mapped) or a tombstone. Everything else is the
# unresolved M2 backlog the audit report (#8) gates to zero.

# --- Mapped: one confirmed canonical mapping per class D1..D5 ---

[[override]]
name = "IsUnitPausedBJ"
class = "D1"
goMapping = "Unit.Paused"
goSignature = "() bool"
collapsesWith = ["IsUnitPaused"]
package = "litd/api"
reason = "confirmed pure passthrough of native IsUnitPaused (dedup §2 ex.3); the native folds onto the same getter"

[[override]]
name = "PauseUnitBJ"
class = "D2"
goMapping = "Unit.SetPaused"
goSignature = "(paused bool)"
collapsesWith = ["PauseUnit", "BlzPauseUnitEx"]
package = "litd/api"
reason = "reorders args over native PauseUnit; canonical keeps full set (dedup §3 ex.1); the native folds onto the same setter"

[[override]]
name = "SetUnitPosition"
class = "D3"
goMapping = "Unit.SetPosition"
goSignature = "(pos Vec2)"
collapsesWith = ["SetUnitX", "SetUnitY", "SetUnitPositionLoc"]
package = "litd/api"
reason = "x/y/Loc position family collapses onto Vec2 setter (dedup §4 ex.1)"

[[override]]
name = "PolledWait"
class = "D4"
goMapping = "PolledWait"
goSignature = "(seconds float64)"
package = "litd/api/helpers"
reason = "genuine timer-polling wait; lives as a scheduler helper (dedup §5 ex.1)"

[[override]]
name = "SetUnitState"
class = "D5"
goMapping = "Unit.SetLife"
goSignature = "(v float64)"
collapsesWith = ["SetUnitLifeBJ", "SetUnitLifePercentBJ", "SetUnitManaBJ", "SetUnitManaPercentBJ"]
package = "litd/api"
reason = "enum-keyed state setter collapses onto typed accessors (dedup §6 ex.1); already hand-implemented in M5 — generator must skip. The whole state-setter BJ family folds here onto the typed Unit.Set{Life,Mana} accessors over the one state table: SetUnitLifeBJ (clamp-on-set life), SetUnitLifePercentBJ/SetUnitManaPercentBJ (percent forms), SetUnitManaBJ (mana) — one canonical target avoids the duplicateTargets gate"

[[override]]
name = "GetUnitCount"
class = "D2"
goMapping = "UnitCount"
goSignature = "(unitTypeID int) int"
package = "litd/ai"
reason = "commonai query native maps canonically into the AI domain (D-2026-06-11-6); no capability tombstone"

