# The Unbound — playable unit roster (R-AST-1; identity.md §2: "Aggression,
# mobility, portable light"; §3: carried flame = moving vision/aura). Authored
# in seconds / units-per-second / revolutions-per-second; the loader converts to
# 50 ms ticks and 32.32 fixed-point. Original balance (PRD §2.2, no WC3 data
# copying). Faction texture = MOBILITY/AGGRESSION BIAS, the mirror of the Vigil:
# every Unbound unit moves FASTER than its Vigil counterpart and wears LIGHTER
# armor, trading durability for speed and damage.
#
# Cooldowns are whole multiples of 50 ms: 1.50 s = 30 t, 1.25 s = 25 t,
# 1.75 s = 35 t.

# Forager — worker. Faster and flimsier than the Vigil lamplighter; the Unbound
# economy keeps moving. Light melee tap only.
