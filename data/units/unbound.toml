# Pyre_wagon — the portable-flame carrier (identity.md §3). Noncombat-leaning:
# a token ram attack only; its real job is the LARGE sight radius that the
# portable-flame aura mechanic (#171) consumes as moving vision. sight-night ==
# sight-day on purpose: the carried light is its own source, so the Flicker dim
# (#170) does NOT shrink it (identity.md §2 "the point of carrying your own
# light"). Every other unit's sight-night < sight-day and dims with the cycle.
# Heavier and slower than the rest — the one Unbound unit that trades mobility
# for the light it carries.
[[unit]]
id = "pyre_wagon"
life = 420
regen = 0.25
armor = 2
armor-type = "medium"
move-speed = 240
turn-rate = 0.5
collision-size = 24
pathing = "ground"
acquisition-range = 300
sight-day = 2400
sight-night = 2400
model = "units/unbound/pyre_wagon.glb"
food-cost = 4
costs = { gold = 180, lumber = 90 }
train-seconds = 32.0

