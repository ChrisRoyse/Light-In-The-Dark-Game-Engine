# ============================================================================
# Hashtables & gamecache (#242). 80-native type matrix -> generic Table[V]
# (table.go) + Attachment[V] (attach.go); gamecache -> Game.Storage()
# (savedata.go). Save/Load/Have/Remove typed variants collapse (D3); the
# whole-game Save/LoadGame, unit snapshots, and SyncStored* are deferred.
# ============================================================================

[[override]]
name = "InitHashtable"
class = "D1"
goMapping = "NewTable"
goSignature = "[V any]() *Table[V]"
package = "litd/api"
reason = "hashtable handle becomes the generic Table[V] (D3 type matrix collapse); InitHashtable constructs it"

[[override]]
name = "SaveInteger"
class = "D3"
goMapping = "Table.Set"
goSignature = "(parent, child int, v V)"
package = "litd/api"
reason = "the entire Save{Integer,Real,Boolean,String}/Save*Handle matrix collapses onto Table[V].Set — the type is the type parameter, not a native suffix (dedup §6 type matrix); Table.Set is the representative"

