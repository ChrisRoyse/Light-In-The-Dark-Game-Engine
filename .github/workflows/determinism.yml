# 10k-tick full-sim determinism matrix (#199, determinism.md §3).
# TRIGGERS: workflow_dispatch ONLY — Actions activation is gated on
# the billing decision (#284, operator-only) and the project-end CI
# policy (commit 9306763). Flip to push/schedule when #284 resolves.
#
# Per-commit subset: ubuntu amd64, optimized + -race.
# Nightly full matrix (enable the schedule): three OSes, arm64 via
# ubuntu-24.04-arm, unoptimized cell.
name: determinism
on:
  workflow_dispatch: {}

jobs:
  trace:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     flags: ""                        }
          - { os: ubuntu-latest,     flags: "-race"                   }
          - { os: ubuntu-latest,     flags: '-gcflags=all=-N -l'      }
          - { os: ubuntu-24.04-arm,  flags: ""                        }
          - { os: windows-latest,    flags: ""                        }
          - { os: macos-latest,      flags: ""                        }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: 10k-tick trace
        run: go test ./litd/sim/ -run 'TestDeterminism10k$' ${{ matrix.flags }} -v 2>&1 | tee trace-${{ runner.os }}-${{ runner.arch }}.txt
      - uses: actions/upload-artifact@v4
        with:
          name: trace-${{ matrix.os }}-${{ strategy.job-index }}
          path: trace-*.txt
