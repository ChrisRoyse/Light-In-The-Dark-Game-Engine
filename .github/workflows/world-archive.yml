# world-archive producer + validation gate (#209; validation-and-data.md §4
# "M6 onward: assetcheck archive validates the fixture(s) on every build").
# Reproduces the First Flame slice archive from its committed inputs
# (data/maps/firstflame + the map-driven beacon world) via the make-level
# producer, then validates it with `assetcheck archive` — green required.
#
# TRIGGERS: workflow_dispatch ONLY — Actions activation is gated on the billing
# decision (#284, operator-only), matching jassgen-audit.yml. Flip to
# push/pull_request when #284 resolves.
#
# NOTE: the archive itself is a reproducible build artifact (gitignored, *.litdworld);
# CI produces it fresh each run rather than tracking the binary.
name: world-archive
on:
  workflow_dispatch: {}

jobs:
  pack-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: Produce + validate the First Flame archive
        run: |
          scripts/pack-world.sh data/maps/firstflame worlds/firstflame-beacon \
            worlds/firstflame.litdworld ">=0.1.0 <0.2.0" \
            "Light in the Dark" "First Flame" \
            "Two-player beacon duel on the ashen veil"
      - name: Repack reproducibility (identical aggregate hash)
        run: |
          cp worlds/firstflame.litdworld /tmp/a.litdworld
          scripts/pack-world.sh data/maps/firstflame worlds/firstflame-beacon \
            /tmp/b.litdworld ">=0.1.0 <0.2.0" \
            "Light in the Dark" "First Flame" \
            "Two-player beacon duel on the ashen veil"
          if ! cmp -s /tmp/a.litdworld /tmp/b.litdworld; then
            echo "::error::world archive is not reproducible (byte diff across repacks)"; exit 1
          fi
          echo "repack reproducible: $(sha256sum /tmp/a.litdworld | cut -d' ' -f1)"
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: firstflame-litdworld
          path: worlds/firstflame.litdworld
          if-no-files-found: error
