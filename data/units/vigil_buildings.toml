# The Vigil — building tables (R-AST-1; identity.md §2: feudal beacon-keepers,
# fortified + siegecraft). Buildings are trainable-producer entries in the same
# [[unit]] schema family (validation-and-data.md §3.2): footprint > 0 +
# build-seconds > 0 marks a worker-constructable building. Costs resolve against
# the economy registry (gold/lumber); trains/researches resolve to defined
# entries. Tech-tree gating (requires) lives in data/tech/upgrades.toml.
# Original balance (PRD §2.2). Defensive faction texture: fortified armor, a
# real defensive tower.

# Bastion — town hall (tier 1 root). Trains the worker; the gold/lumber drop-off
# (depot-for); provides starting food. High HP, fortified — the Vigil turtles.
[[unit]]
id = "bastion"
life = 1500
armor = 5
armor-type = "fortified"
move-speed = 0
turn-rate = 0.1
collision-size = 48
pathing = "ground"
sight-day = 1400
sight-night = 1000
model = "buildings/vigil/bastion.glb"
footprint = 4
build-seconds = 90.0
food-provided = 10
costs = { gold = 385, lumber = 185 }
depot-for = ["gold", "lumber"]
trains = ["lamplighter"]

