# --- Units category (#217): natives/BJs backed by the implemented litd/api
# units surface (unit.go, handle_validity.go, order.go). Each canonical entry
# folds its dedup family via collapsesWith so the family resolves under one
# symbol without tripping the duplicateTargets (M5) gate. See jass-mapping/units.md.

[[override]]
name = "CreateUnit"
class = "D2"
goMapping = "Game.CreateUnit"
goSignature = "(owner Player, typ UnitType, pos Vec2, facing Angle) Unit"
collapsesWith = ["CreateUnitByName", "CreateUnitAtLoc", "CreateUnitAtLocByName", "CreateUnitAtLocSaveLast"]
package = "litd/api"
reason = "create family collapses onto one ctor returning the unit (dedup §3); the ByName, AtLoc (location), and SaveLast (side-channel) variants are arg-shape/last-handle reorderings — the Go return value supersedes bj_lastCreatedUnit"

[[override]]
name = "KillUnit"
class = "D1"
goMapping = "Unit.Kill"
goSignature = "()"
package = "litd/api"
reason = "lifecycle kill native maps directly onto the lifecycle verb (dedup §2); marks the unit dead for the step's death pass"

[[override]]
name = "RemoveUnit"
class = "D1"
goMapping = "Unit.Remove"
goSignature = "()"
