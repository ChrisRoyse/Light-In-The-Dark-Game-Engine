# The Vigil — playable unit roster (R-AST-1; identity.md §2: "Versatile,
# defensive, light-infused support magic"; §6 art-direction binds the models).
# Authored in seconds / units-per-second / revolutions-per-second — the loader
# converts to 50 ms ticks and 32.32 fixed-point. Original balance (PRD §2.2, no
# WC3 data copying). Faction texture = DEFENSIVE BIAS: armor and regen are
# emphasized over move-speed (every Vigil unit moves <= 280 u/s, below the
# generic 300 ranged baseline), per identity.md §2.
#
# Cooldowns are whole multiples of 50 ms (tick grid): 1.50 s = 30 t, 1.00 s =
# 20 t, 1.75 s = 35 t, 2.00 s = 40 t.

# Lamplighter — worker. Tends beacons; modest self-sustaining regen so a
# harasser cannot trade it down for free. Light melee tap only.
