# Smart-order (right-click) resolution table — input.md §4,
# combat-and-orders.md §2.2. rules.<target-class> lists one order name
# per unit class, in unit-classes column order. Order names must be in
# the v1 opcode registry (input.md §8); the loader rejects anything
# else.
#
# Every row resolves to a registered opcode: ally → follow (#306),
# item → get-item (#305) — the §4 spec rows the v1 registry could not
# carry, now closed (discovery #292).

unit-classes = ["fighter", "worker"]

[rules]
ground-point = ["move", "move"]
enemy = ["attack", "attack"]
ally = ["follow", "follow"]
own-building = ["rally", "rally"]
resource = ["move", "harvest"]
item = ["get-item", "get-item"]
